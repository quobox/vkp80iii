name: Docs

on:
  push:
    branches: [master]
    # Only rebuild/redeploy when something that affects the rendered site
    # changes -- avoids needless (and occasionally rate-limited) Pages deploys
    # on unrelated pushes (e.g. lockfile-only changes).
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/**"
      - "README.md"
      - "CHANGELOG.md"
      - ".github/workflows/docs.yml"

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deployment; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --group docs
      - run: uv run mkdocs build --strict
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
